name: Terraform Check

on:
  pull_request:
    paths:
      - "Azure AI Solutions/AI Agents/azure-lz-governance-advisor/infra/terraform/**"
      - "Azure AI Solutions/AI Agents/azure-lz-governance-advisor/.github/workflows/terraform-check.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: Azure AI Solutions/AI Agents/azure-lz-governance-advisor/infra/terraform

jobs:
  terraform-check:
    name: Validate and Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -input=false \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var='budget_contact_emails=["${{ vars.BUDGET_CONTACT_EMAIL }}"]'
