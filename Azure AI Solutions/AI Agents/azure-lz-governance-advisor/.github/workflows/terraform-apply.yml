name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "Azure AI Solutions/AI Agents/azure-lz-governance-advisor/infra/terraform/**"
      - "Azure AI Solutions/AI Agents/azure-lz-governance-advisor/.github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: Azure AI Solutions/AI Agents/azure-lz-governance-advisor/infra/terraform

jobs:
  terraform-apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -input=false \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var='budget_contact_emails=["${{ vars.BUDGET_CONTACT_EMAIL }}"]'
